<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #0d47a1;
            --blocked: #c62828;
            --selected: #2e7d32;
            --bg-light: #f4f6f9;
        }

        body { font-family: -apple-system, sans-serif; background-color: var(--bg-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .control-sidebar { width: 320px; background: white; padding: 25px; box-shadow: 3px 0 15px rgba(0,0,0,0.05); z-index: 10; display: flex; flex-direction: column; gap: 20px; }
        h2 { margin-top: 0; color: var(--primary); font-weight: 800; font-size: 1.4rem; }
        
        .selection-card { background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); }
        .selection-value { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-top: 5px; }

        .map-viewport { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; background: #eaedf2; overflow: auto; }
        .map-canvas-container { background-color: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-radius: 12px; border: 1px solid #dcdfe4; padding: 20px; width: 100%; height: 100%; overflow: auto;}

        /* The Grid */
        svg.floorplan-svg { min-width: 1600px; min-height: 1200px; display: block; margin: auto;}
        
        /* Interactive Zones */
        .zone-box { fill: #ffffff; stroke: #b0bec5; stroke-width: 2; cursor: pointer; transition: 0.15s; }
        .corridor-box { fill: #eceff1; stroke: #90a4ae; stroke-width: 2; cursor: pointer; transition: 0.15s; }
        .parking-box { fill: #f5f5f5; stroke: #e0e0e0; stroke-dasharray: 10,10; stroke-width: 2; pointer-events: none; }

        body.student-mode .zone-box:hover:not(.blocked), body.student-mode .corridor-box:hover:not(.blocked) { fill: #e8f5e9; stroke: var(--selected); stroke-width: 3; }
        body.admin-mode .zone-box:hover, body.admin-mode .corridor-box:hover { fill: #ffebee; stroke: var(--blocked); stroke-width: 3; }

        .zone-box.selected { fill: #c8e6c9 !important; stroke: var(--selected) !important; stroke-width: 3; }
        .zone-box.blocked, .corridor-box.blocked { fill: url(#hazard-stripes) !important; stroke: var(--blocked) !important; stroke-width: 3; cursor: not-allowed; }

        .lbl-room { font-size: 14px; font-weight: bold; fill: #1a237e; pointer-events: none; }
        .lbl-large { font-size: 24px; font-weight: 900; fill: #455a64; pointer-events: none; letter-spacing: 2px;}
        .blocked + text { fill: #c62828 !important; font-weight: 900; }
        .selected + text { fill: #1b5e20 !important; }
    </style>
</head>

    <script>
        const nodes = document.querySelectorAll('.map-node');
        const uiRoomDisplay = document.getElementById('ui-room-display');
        const adminToggle = document.getElementById('checkbox-admin');
        const appBody = document.getElementById('app-body');

        adminToggle.addEventListener('change', (e) => {
            nodes.forEach(n => n.querySelector(['rect', 'path']).classList.remove('selected'));
            if (e.target.checked) {
                appBody.className = "admin-mode";
                uiRoomDisplay.innerText = "ADMIN MODE";
                uiRoomDisplay.style.color = "#c62828";
            } else {
                appBody.className = "student-mode";
                uiRoomDisplay.innerText = "None";
                uiRoomDisplay.style.color = "var(--primary)";
            }
        });

        nodes.forEach(node => {
            node.addEventListener('click', function() {
                const shapes = this.querySelectorAll('rect, path');
                const roomId = this.getAttribute('data-id');

                shapes.forEach(rect => {
                    if (adminToggle.checked) {
                        rect.classList.toggle('blocked');
                        return;
                    }

                    if (rect.classList.contains('blocked')) {
                        alert(`Access Restricted: ${roomId} is locked by administration.`);
                        return;
                    }

                    nodes.forEach(n => n.querySelectorAll('rect, path').forEach(s => s.classList.remove('selected')));
                    rect.classList.add('selected');
                    uiRoomDisplay.innerText = roomId;
                });
            });
        });
    </script>
